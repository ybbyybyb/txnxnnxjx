<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التحقق من البريد</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}body{background:#000;color:#fff;min-height:100vh;overflow:hidden;position:relative}.header{display:flex;align-items:center;justify-content:center;padding:18px 16px;position:relative}.back{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:0;color:#fff;font-size:22px;cursor:pointer;padding:4px}.title{font-size:17px;font-weight:500}.content{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:30vh;opacity:0;transition:opacity .4s ease}.content.show{opacity:1}.icon{width:140px;height:140px;display:flex;align-items:center;justify-content:center}.icon img{width:100%;height:100%;object-fit:contain}.msg{margin-top:22px;font-size:18px;font-weight:500;letter-spacing:.3px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);transition:opacity .35s ease;opacity:1}.overlay.hide{opacity:0;pointer-events:none}.box{background:rgba(30,30,30,.92);border:1px solid rgba(255,255,255,.08);padding:26px 34px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:16px;transform:scale(.6);opacity:0;animation:pop .9s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 8px 30px rgba(0,0,0,.5)}@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}.loader{width:34px;height:34px;border:3px solid rgba(255,255,255,.18);border-top-color:#22c55e;border-radius:50%;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-txt{font-size:15px;color:#eee}</style></head><body><div class="header"><button class="back" onclick="history.back()">❮</button><div class="title">التحقق من البريد</div></div><div class="content" id="c"><div class="icon"><img src="https://i.ibb.co/FkGjxgqV/88.png" alt="ok"></div><div class="msg">تم التحقق بنجاح</div></div><div class="overlay" id="o"><div class="box"><div class="loader"></div><div class="load-txt">جاري التحميل يرجى الإنتظار</div></div></div><script>setTimeout(()=>{document.getElementById('o').classList.add('hide');document.getElementById('c').classList.add('show');setTimeout(()=>document.getElementById('o').remove(),400)},2200)</script></body></html>
